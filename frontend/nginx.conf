# ============================================================================
# Nginx 配置：為 React SPA（Single Page Application）最佳化
# ============================================================================

# 關閉 Nginx 版本顯示（安全最佳實踐）
server_tokens off;

# 主伺服器塊
server {
    # 監聽埠 80
    listen 80;
    
    # 伺服器名稱（容器環境通常使用 localhost 或域名）
    server_name _;

    # 根目錄（靜態檔案位置）
    root /usr/share/nginx/html;
    
    # 預設首頁
    index index.html;

    # ========================================================================
    # 【核心：SPA 路由處理】
    # ========================================================================
    # 問題：React Router 等前端路由框架不會向伺服器發送實際的 HTTP 請求
    #       例如 /dashboard、/audit 只是前端路由，伺服器無此實體檔案
    # 解決：使用 try_files 指令，若檔案不存在則導向 /index.html
    #       讓 React 應用程式在瀏覽器端處理路由
    # ========================================================================
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ========================================================================
    # 【靜態資源快取策略】
    # ========================================================================
    # Vite 構建的檔案通常包含 hash，例如 main.abc123.js
    # 這些檔案可安全地快取很長時間
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        # 快取時間設定為 1 年（31536000 秒）
        expires 365d;
        
        # 告訴瀏覽器此資源可公開快取
        add_header Cache-Control "public, immutable";
    }

    # ========================================================================
    # 【HTML 檔案策略】
    # ========================================================================
    # index.html 不應被長期快取，需要頻繁檢查更新
    location = /index.html {
        # 快取控制：瀏覽器必須驗證快取是否仍然有效
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # ========================================================================
    # 【Gzip 壓縮】
    # ========================================================================
    # Nginx 默認已啟用，但確保 JS、CSS、JSON 被壓縮
    gzip on;
    gzip_types text/plain text/css text/xml text/javascript 
               application/x-javascript application/javascript application/xml+rss 
               application/json application/atom+xml;
    gzip_min_length 1000;
    gzip_disable "msie6";

    # ========================================================================
    # 【安全相關 HTTP Headers】
    # ========================================================================
    # 防止 MIME 嗅探（MIME sniffing）攻擊
    add_header X-Content-Type-Options "nosniff";
    
    # 啟用 XSS 保護
    add_header X-XSS-Protection "1; mode=block";
    
    # 點擊劫持保護（此 SPA 不允許被 iframe 嵌入）
    add_header X-Frame-Options "DENY";
}
